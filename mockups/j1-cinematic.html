<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>J1 Cinematic HUD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Consolas','Segoe UI',monospace}
body{display:flex;align-items:center;justify-content:center;background:#000;padding:20px}
.s{width:1024px;height:600px;overflow:hidden;border-radius:18px;position:relative;color:#bfeeff;
  background:radial-gradient(ellipse at 50% 50%,#04222e 0%,#021018 60%,#00060c 100%)}
.s::after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(0,229,255,.025) 50%,transparent 50%);background-size:100% 3px;pointer-events:none}
/* nav */
.nav{position:absolute;left:0;top:0;bottom:0;width:60px;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 0;border-right:1px solid rgba(0,200,255,.15);z-index:6}
.nav .d{width:24px;height:24px;border:2px solid #38e0ff;border-radius:50%;margin-bottom:10px;box-shadow:0 0 12px #38e0ff;animation:pulse 3s ease-in-out infinite}
.nav button{width:38px;height:32px;border:1px solid rgba(0,200,255,.18);background:transparent;color:#5aa6c4;font-size:13px;cursor:pointer}
.nav button.on{border-color:#38e0ff;color:#dffaff;box-shadow:0 0 10px rgba(56,224,255,.4) inset}
.nav .sys{margin-top:auto;display:flex;flex-direction:column;gap:6px}
/* big rotating reticle behind everything */
.reticle{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:520px;height:520px;opacity:.5}
.reticle div{position:absolute;border-radius:50%;border:1px solid rgba(56,224,255,.25)}
.reticle .o1{inset:0;border-top-color:#38e0ff;border-width:2px;animation:spin 18s linear infinite}
.reticle .o2{inset:60px;border-style:dashed;border-color:rgba(56,224,255,.18);animation:spin 26s linear infinite reverse}
.reticle .o3{inset:140px;border-right-color:#ffd479;border-width:2px;animation:spin 12s linear infinite}
.reticle .o4{inset:210px;border-color:rgba(56,224,255,.4)}
/* center read */
.core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;z-index:4}
.core .pct{font-size:60px;font-weight:700;color:#eafdff;text-shadow:0 0 26px rgba(56,224,255,.7);font-family:'Segoe UI',sans-serif;letter-spacing:-1px}
.core .lab{font-size:11px;letter-spacing:5px;color:#5fc8e8}
.core .st{margin-top:8px;font-size:13px;letter-spacing:2px;color:#ffd479}
/* header */
.hdr{position:absolute;top:18px;left:80px;right:24px;display:flex;justify-content:space-between;align-items:flex-start;z-index:6}
.hdr .t{font-size:12px;letter-spacing:3px;color:#5fc8e8}
.hdr .big{font-size:20px;letter-spacing:2px;color:#eafdff;font-family:'Segoe UI',sans-serif;font-weight:300}
.hdr .clk{font-size:30px;font-weight:200;color:#eafdff;text-shadow:0 0 16px rgba(56,224,255,.5)}
/* corner readouts that "fly in" */
.read{position:absolute;border:1px solid rgba(0,200,255,.22);background:rgba(0,40,56,.3);padding:9px 11px;z-index:6;backdrop-filter:blur(2px);animation:flyin .8s ease-out both}
.read::before{content:"";position:absolute;left:-1px;top:-1px;width:10px;height:10px;border-left:2px solid #38e0ff;border-top:2px solid #38e0ff}
.read .h{font-size:9px;letter-spacing:2px;color:#5fc8e8;margin-bottom:6px}
.read .li{font-size:12px;padding:2px 0;display:flex;justify-content:space-between;gap:16px;color:#bfeeff}
.read .a{color:#ff6f6f}.read .w{color:#ffc04a}
.tl{left:80px;top:96px;width:230px;animation-delay:.2s}
.bl{left:80px;bottom:64px;width:230px;animation-delay:.5s}
.tr{right:24px;top:96px;width:210px;animation-delay:.35s}
.br{right:24px;bottom:64px;width:210px;animation-delay:.65s}
.foot{position:absolute;left:80px;right:24px;bottom:18px;display:flex;align-items:center;gap:8px;z-index:6}
.foot .b{border:1px solid rgba(0,200,255,.28);padding:6px 12px;font-size:11px;letter-spacing:1px;color:#bfeeff}
.foot .think{margin-left:auto;color:#5fc8e8;font-size:12px;letter-spacing:1px;animation:blink 2.4s step-end infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{box-shadow:0 0 12px #38e0ff}50%{box-shadow:0 0 22px #38e0ff,0 0 6px #fff}}
@keyframes flyin{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}
@keyframes blink{0%,92%{opacity:1}94%,100%{opacity:.4}}
</style></head>
<body><div class="s">
  <nav class="nav"><div class="d"></div>
    <button class="on">⌂</button><button>▤</button><button>☑</button><button>👥</button><button>◎</button><button>⚙</button>
    <div class="sys"><button>🔒</button><button>⏻</button></div></nav>
  <div class="reticle"><div class="o1"></div><div class="o2"></div><div class="o3"></div><div class="o4"></div></div>
  <div class="hdr"><div><div class="t">S.A.R.A · ONLINE</div><div class="big">GOOD EVENING, NICK</div></div><div class="clk">19:30</div></div>
  <div class="core"><div class="pct">90%</div><div class="lab">CONFIDENCE</div><div class="st">◇ FIREFIGHTING</div></div>
  <div class="read tl"><div class="h">PRIORITIES</div>
    <div class="li"><span>SMS Issues</span><span class="a">SLA 0m</span></div>
    <div class="li"><span>Abdi 1:1</span><span class="w">+37d</span></div>
    <div class="li"><span>Escalations</span><span class="w">×2</span></div></div>
  <div class="read tr"><div class="h">SITREP</div>
    <div class="li"><span>Location</span><span>HOME</span></div>
    <div class="li"><span>Up next</span><span>10:30</span></div></div>
  <div class="read bl"><div class="h">QUEUE</div>
    <div class="li"><span>Open</span><span class="a">42 ▲6</span></div>
    <div class="li"><span>Team QA</span><span>88%</span></div></div>
  <div class="read br"><div class="h">CONDITIONS</div>
    <div class="li"><span>Temp</span><span>17°C</span></div>
    <div class="li"><span>Sky</span><span>Cloudy</span></div></div>
  <div class="foot"><div class="b">▤ QUEUE</div><div class="b">◎ FOCUS</div><div class="b">✎ CAPTURE</div><div class="b">☼ BRIEF</div>
    <div class="think">▸ SARA: firefighting — shall I open the Queue?</div></div>
</div></body></html>
