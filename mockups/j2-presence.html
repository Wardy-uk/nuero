<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>J2 Conversational Presence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
body{display:flex;align-items:center;justify-content:center;background:#000;padding:20px}
.s{width:1024px;height:600px;overflow:hidden;border-radius:18px;position:relative;color:#dff3ff;
  background:radial-gradient(ellipse at 50% 56%,#06283a 0%,#03141f 55%,#000509 100%)}
.nav{position:absolute;left:0;top:0;bottom:0;width:58px;display:flex;flex-direction:column;align-items:center;gap:9px;padding:18px 0;z-index:6}
.nav button{width:9px;height:9px;border-radius:50%;border:0;background:#1c4254;cursor:pointer}
.nav button.on{background:#46d6ee;box-shadow:0 0 10px #46d6ee;height:22px;border-radius:5px}
.nav .sys{margin-top:auto;display:flex;flex-direction:column;gap:14px}
.nav .sys button{width:16px;height:16px;border-radius:50%;background:#16313d}
.clk{position:absolute;top:24px;right:30px;text-align:right;z-index:6}
.clk .t{font-size:26px;font-weight:200;letter-spacing:2px}.clk .d{font-size:11px;color:#5a7d92;letter-spacing:2px}
/* the living waveform orb */
.beings{position:absolute;left:0;right:0;top:130px;display:flex;flex-direction:column;align-items:center;gap:0}
.orb{width:150px;height:150px;border-radius:50%;position:relative;
  background:radial-gradient(circle at 46% 42%,#dffaff,#52cfe6 40%,#1b86a0 64%,rgba(10,60,76,.1) 80%,transparent 84%);
  box-shadow:0 0 70px 12px rgba(70,214,238,.45),inset -8px -10px 30px rgba(2,24,34,.5),inset 8px 10px 28px rgba(255,255,255,.3);
  animation:breathe 4s ease-in-out infinite}
.orb::before,.orb::after{content:"";position:absolute;border-radius:50%;border:1px solid rgba(70,214,238,.35)}
.orb::before{inset:-18px;animation:ring 4s ease-out infinite}
.orb::after{inset:-18px;animation:ring 4s ease-out infinite 2s}
/* equaliser bars under orb (voice) */
.eq{display:flex;gap:5px;align-items:flex-end;height:26px;margin-top:22px}
.eq i{width:4px;background:linear-gradient(#7fe6f4,#2a9cb6);border-radius:2px;animation:bar 1.1s ease-in-out infinite}
.eq i:nth-child(1){height:10px;animation-delay:0s}.eq i:nth-child(2){height:22px;animation-delay:.1s}
.eq i:nth-child(3){height:14px;animation-delay:.2s}.eq i:nth-child(4){height:26px;animation-delay:.05s}
.eq i:nth-child(5){height:12px;animation-delay:.25s}.eq i:nth-child(6){height:20px;animation-delay:.15s}
.eq i:nth-child(7){height:9px;animation-delay:.3s}
.say{margin-top:26px;text-align:center;max-width:680px;padding:0 20px}
.say .hi{font-size:15px;color:#6f96ad;letter-spacing:1px}
.say .msg{font-size:26px;font-weight:500;line-height:1.4;margin-top:10px;color:#eafaff}
.say .msg b{color:#ff8f6a}
/* glowing 'what matters' chips that float around */
.chips{position:absolute;left:58px;right:0;bottom:70px;display:flex;justify-content:center;gap:14px;z-index:6}
.chip{display:flex;align-items:center;gap:8px;font-size:13px;color:#cfe6f4;border:1px solid rgba(70,214,238,.25);background:rgba(10,50,66,.4);padding:8px 14px;border-radius:99px;backdrop-filter:blur(4px)}
.chip .dt{width:7px;height:7px;border-radius:50%;box-shadow:0 0 8px currentColor}
.foot{position:absolute;left:58px;right:0;bottom:0;display:flex;align-items:center;justify-content:center;gap:24px;padding:12px;z-index:6;font-size:12px;color:#5a7d92}
.foot .a{color:#7fe6f4}
@keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 0 70px 12px rgba(70,214,238,.45),inset -8px -10px 30px rgba(2,24,34,.5),inset 8px 10px 28px rgba(255,255,255,.3)}50%{transform:scale(1.05);box-shadow:0 0 96px 20px rgba(70,214,238,.6),inset -8px -10px 30px rgba(2,24,34,.5),inset 8px 10px 30px rgba(255,255,255,.4)}}
@keyframes ring{0%{opacity:.5;transform:scale(1)}100%{opacity:0;transform:scale(1.7)}}
@keyframes bar{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
</style></head>
<body><div class="s">
  <nav class="nav"><button class="on"></button><button></button><button></button><button></button><button></button><button></button>
    <div class="sys"><button></button><button></button></div></nav>
  <div class="clk"><div class="t">19:30</div><div class="d">FRI 5 JUNE</div></div>
  <div class="beings">
    <div class="orb"></div>
    <div class="eq"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <div class="say"><div class="hi">Good evening, Nick</div>
      <div class="msg">You're <b>firefighting</b> — two tickets are breaching SLA. Want me to open the Queue?</div></div>
  </div>
  <div class="chips">
    <div class="chip" style="color:#ff8f8f"><span class="dt"></span><span style="color:#cfe6f4">SMS Issues · 0m SLA</span></div>
    <div class="chip" style="color:#ffc04a"><span class="dt"></span><span style="color:#cfe6f4">Abdi 1:1 · 37d</span></div>
    <div class="chip" style="color:#46d6ee"><span class="dt"></span><span style="color:#cfe6f4">Standup · 10:30</span></div>
  </div>
  <div class="foot"><span class="a">🎤 Tap or say "SARA"</span> · Home · Living room · 90% confident</div>
</div></body></html>
