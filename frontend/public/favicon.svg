<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#0d0f14"/>
  <rect x="8" y="8" width="496" height="496" rx="56" fill="none" stroke="#4f9cf9" stroke-width="12" opacity="0.3"/>
  <!-- Brain/network: nodes connected by lines -->
  <g fill="none" stroke="#4f9cf9" stroke-width="8" stroke-linecap="round" opacity="0.4">
    <!-- Connection lines -->
    <line x1="256" y1="140" x2="170" y2="220"/>
    <line x1="256" y1="140" x2="342" y2="220"/>
    <line x1="170" y1="220" x2="140" y2="320"/>
    <line x1="170" y1="220" x2="256" y2="300"/>
    <line x1="342" y1="220" x2="372" y2="320"/>
    <line x1="342" y1="220" x2="256" y2="300"/>
    <line x1="140" y1="320" x2="210" y2="390"/>
    <line x1="256" y1="300" x2="210" y2="390"/>
    <line x1="256" y1="300" x2="310" y2="390"/>
    <line x1="372" y1="320" x2="310" y2="390"/>
  </g>
  <!-- Nodes -->
  <g fill="#4f9cf9">
    <circle cx="256" cy="140" r="22"/>
    <circle cx="170" cy="220" r="18"/>
    <circle cx="342" cy="220" r="18"/>
    <circle cx="140" cy="320" r="15"/>
    <circle cx="256" cy="300" r="20"/>
    <circle cx="372" cy="320" r="15"/>
    <circle cx="210" cy="390" r="16"/>
    <circle cx="310" cy="390" r="16"/>
  </g>
  <!-- Centre glow -->
  <circle cx="256" cy="300" r="20" fill="#4f9cf9" opacity="0.3" filter="url(#glow)"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
