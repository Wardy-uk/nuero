[build]
  base = "frontend"
  # rollup has a platform-specific optional-dep bug
  # (https://github.com/npm/cli/issues/4828); we must wipe BOTH the
  # workspace-root node_modules/package-lock and the frontend ones so
  # npm fully re-resolves rollup's linux binary on Netlify's Linux box.
  command = "rm -rf ../node_modules ../package-lock.json node_modules dist && npm install && npm run build"
  publish = "dist"
  ignore = "false"

[build.environment]
  # VITE_API_URL and VITE_VAULT_API_KEY must be set in Netlify UI:
  # Site settings > Build & deploy > Environment variables
  # VITE_API_URL = https://pi-dev.tailecb90f.ts.net
  # VITE_VAULT_API_KEY = (your vault key)
  NODE_VERSION = "20"
